<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>While-valikko</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>While-pohjainen tehtävä</h1>

    <div class="menu">
        <button onclick="window.location='index.html'">⬅ Takaisin päävalikkoon</button>
    </div>

<script>
let kaynnissa = true;

while (kaynnissa) {

    let valinta = prompt(
        "Valikko:\n" +
        "1 = Ratkaise tehtävä\n" +
        "2 = Poistu"
    );

    if (valinta === "1") {

        let vastaus = prompt("Kirjoita funktio greet(name), joka tulostaa 'Hei, nimi'");

        let oikea1 = `function greet(name) {
  console.log("Hei, " + name);
}`;
        let oikea2 = `function greet(name) {
  console.log('Hei, ' + name);
}`;

        let siivottu = vastaus.replace(/\s+/g, "");
        let siivottu1 = oikea1.replace(/\s+/g, "");
        let siivottu2 = oikea2.replace(/\s+/g, "");

        if (siivottu === siivottu1 || siivottu === siivottu2) {
            alert("Oikein!");
        } else {
            alert("Väärin!");
        }

    } else if (valinta === "2") {
        kaynnissa = false;
        alert("Ohjelma suljetaan.");
    } else {
        alert("Virheellinen valinta.");
    }
}
</script>

</body>
</html>
